<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Giriş</title>
    <style>
      body { font-family: Arial, sans-serif; background: #f4f7fb; margin: 0; display: grid; place-items: center; min-height: 100vh; }
      .box { background: white; padding: 24px; border-radius: 16px; width: min(90vw, 360px); box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
      h1 { margin-top: 0; }
      label { display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; }
      input, button { padding: 10px; border-radius: 10px; border: 1px solid #cbd5e1; font: inherit; }
      button { background: #2563eb; color: white; border: none; cursor: pointer; width: 100%; }
    </style>
  </head>
  <body>
    <div class="box">
      <h1>Giriş Yap</h1>
      <p>Kullanıcı adları: ercan, ismail, omer</p>
      <form method="POST" action="./login">
        <label>
          Kullanıcı adı
          <input name="username" required />
        </label>
        <label>
          Şifre
          <input name="password" type="password" required />
        </label>
        <button type="submit">Giriş</button>
      </form>
    </div>
  </body>
</html>
