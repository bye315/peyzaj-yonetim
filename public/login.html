<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Giriş</title>
    <link rel="manifest" href="./manifest.json" />
    <meta name="theme-color" content="#4caf50" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="apple-touch-icon" href="./icon.jpg" />
    <style>
      body { font-family: Arial, sans-serif; background: #f4f7fb; margin: 0; display: grid; place-items: center; min-height: 100vh; }
      .box { background: white; padding: 24px; border-radius: 16px; width: min(90vw, 360px); box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
      h1 { margin-top: 0; }
      label { display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; }
      input, button { padding: 10px; border-radius: 10px; border: 1px solid #cbd5e1; font: inherit; }
      button { background: #2563eb; color: white; border: none; cursor: pointer; width: 100%; }
    </style>
  </head>
  <body>
    <div class="box">
      <h1>Giriş Yap</h1>
      <p>Kullanıcı adları: ercan, ismail, omer</p>
      <form id="login-form">
        <label>
          Kullanıcı adı / E-posta
          <input id="username" required />
        </label>
        <label>
          Şifre
          <input id="password" type="password" required />
        </label>
        <button type="submit">Giriş</button>
      </form>
    </div>

    <!-- Firebase SDK (compat mode) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="./firebase-config.js"></script>
    <script>
      // Oturum durumunu dinle: Zaten giriş yapılmışsa doğrudan ana sayfaya git
      auth.onAuthStateChanged((user) => {
        if (user) {
          window.location.href = './index.html';
        }
      });

      document.getElementById('login-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const usernameInput = document.getElementById('username').value.trim().toLowerCase();
        const password = document.getElementById('password').value;

        // Kullanıcı adını e-postaya dönüştür
        const email = usernameInput.includes('@') ? usernameInput : `${usernameInput}@peyzaj.com`;

        try {
          await auth.signInWithEmailAndPassword(email, password);
          window.location.href = './index.html';
        } catch (error) {
          console.error(error);
          alert('Giriş Başarısız!\nHata Kodu: ' + error.code + '\nHata Mesajı: ' + error.message);
        }
      });
    </script>
  </body>
</html>
