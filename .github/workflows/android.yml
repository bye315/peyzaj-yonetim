name: Android APK Derleme

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    name: APK Derleme
    runs-on: ubuntu-latest

    steps:
      - name: Kodu Klonla
        uses: actions/checkout@v4

      - name: Node.js Kurulumu
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Java JDK 17 Kurulumu
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Android SDK Kurulumu
        uses: android-actions/setup-android@v3

      - name: Bağımlılıkları Yükle
        run: npm install

      - name: Capacitor Android Ekle ve Eşitle
        run: |
          npx cap add android
          if [ -f "google-services.json" ]; then
            cp google-services.json android/app/
            echo "google-services.json successfully copied to android/app/"
          else
            echo "Warning: google-services.json not found in root. FCM will not work."
          fi
          node scripts/configure-android.js
          npx cap sync android

      - name: Android APK Derle (Debug)
        run: |
          cd android
          ./gradlew assembleDebug

      - name: APK Dosyasını Yükle (Artifact)
        uses: actions/upload-artifact@v4
        with:
          name: peyzaj-takip-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
